name: vet_plus
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  firebase_database: ^12.0.0
  google_sign_in: ^7.1.1
  cloud_firestore: ^6.0.0
  cloud_functions: 6.0.0
  firebase_messaging: ^16.0.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  table_calendar: ^3.1.2
  # flutter_local_notifications: ^17.2.4  # Commented out due to desugaring issues
  intl: ^0.20.2
  uuid: ^4.4.2
  timezone: ^0.9.4
  
  # UI/UX Enhancement Libraries
  getwidget: ^7.0.0
  flutter_screenutil: ^5.9.3
  gap: ^3.0.1
  google_fonts: ^6.2.1
  
  # Media & File Handling
  firebase_storage: ^13.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.5
  mime: ^2.0.0
  cached_network_image: ^3.4.1
  open_filex: ^4.6.0
  http: ^1.2.2
  
  # Audio/Voice Messages
  audio_waveforms: ^1.2.0
  permission_handler: ^11.3.1
  
  # Chat Enhancements
  any_link_preview: ^3.0.2
  url_launcher: ^6.3.1
  video_compress: ^3.1.4
  emoji_picker_flutter: ^4.4.0
  
  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.5


dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  fake_cloud_firestore: ^4.0.1

